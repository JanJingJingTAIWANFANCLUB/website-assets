<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>30秒帶你認識JanJingJing✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #f2efe9; --text-color: #2c2c2c; --accent-color: #8e7f71; --serif: 'Playfair Display', serif; --sans: 'Inter', "Noto Sans TC", sans-serif; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--text-color); font-family: var(--sans); }
        
        body.locked { overflow: hidden; position: fixed; width: 100%; height: 100%; }
        body.unlocked { overflow-x: hidden; overflow-y: auto; }

        #youtube-player-container { position: fixed; top: -10px; left: -10px; width: 1px; height: 1px; opacity: 0; pointer-events: none; z-index: -1; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; transition: opacity 0.8s ease; padding-bottom: 15vh; background: #000; }
        #bg-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -1; object-fit: cover; opacity: 0.8; }
        .enter-btn { position: relative; z-index: 10001; background: rgba(255,255,255,0.95); border: none; padding: 18px 40px; border-radius: 50px; font-weight: 600; cursor: pointer; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 0.9rem; color: #333; text-transform: uppercase; }

        .nav-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; z-index: 1000; background: rgba(242, 239, 233, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-logo { font-family: var(--serif); font-weight: bold; font-size: 1rem; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: var(--text-color); font-size: 10px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }

        .ticker-wrap { width: 100%; overflow: hidden; background: #fff; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 12px 0; margin-top: 70px; }
        .ticker { display: flex; white-space: nowrap; animation: ticker 40s linear infinite; width: fit-content; }
        .ticker span { font-family: var(--serif); font-size: 12px; letter-spacing: 4px; padding: 0 40px; font-style: italic; text-transform: uppercase; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }
        .section-title { font-family: var(--serif); font-size: 2.2rem; font-style: italic; text-align: center; margin: 50px 0 30px; letter-spacing: 2px; }

        /* Profile 區塊：自適應三張卡片排列 */
        .profile-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
            align-items: start;
        }
        .profile-card {
            width: 100%;
            background: #fff;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .profile-card:hover { transform: translateY(-5px); }
        .profile-card img { width: 100%; height: auto; border-radius: 4px; display: block; }

        .category-label { font-family: var(--serif); font-size: 1.1rem; font-style: italic; color: var(--accent-color); margin: 40px 0 20px; display: block; border-left: 3px solid var(--accent-color); padding-left: 15px; }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 4px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .music-control { position: fixed; bottom: 25px; right: 20px; z-index: 2000; cursor: pointer; width: 45px; height: 45px; display: none; align-items: center; justify-content: center; background: white; color: var(--text-color); border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }

        footer { margin-top: 80px; padding: 40px 0; border-top: 1px solid #ddd; text-align: center; }
        .footer-text { font-family: var(--serif); font-size: 10px; letter-spacing: 2px; color: var(--accent-color); }

        @media (max-width: 600px) {
            .section-title { font-size: 1.8rem; }
            .profile-section { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body class="locked">
    <div id="youtube-player-container"><div id="player"></div></div>
    <div id="music-btn" class="music-control" onclick="toggleMusic()"><i id="music-icon" class="fas fa-music"></i></div>
    
    <div id="splash-screen">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://github.com/JanJingJingTAIWANFANCLUB/website-assets/raw/f5dbef2099d5eae052aa5a3994c24370b1fd3df2/54517.MP4" type="video/mp4">
        </video>
        <button class="enter-btn" onclick="enterSite()">歡迎進入 🦊🐯 的世界</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-logo">30秒帶你認識JanJingJing✨</div>
        <div class="nav-links"><a href="#artists">Profiles</a><a href="#portfolio">Videos</a></div>
    </nav>

    <div class="ticker-wrap">
        <div class="ticker">
            <span>Janhae Ployshompoo Supasap</span>
            <span>JingJing Prariyapit Yu</span>
            <span>Janhae Ployshompoo Supasap</span>
            <span>JingJing Prariyapit Yu</span>
        </div>
    </div>

    <div class="container">
        <section id="artists">
            <h2 class="section-title">Profiles</h2>
            <div class="profile-section">
                
                <div class="profile-card">
                    <img src="https://i.postimg.cc/50g01bgN/2A26EBC1-B57B-48E9-B374-2C3991AB7B95-Coco-AI-20260303-101000-1.png" alt="Janhae Card 1">
                </div>

                <div class="profile-card">
                    <img src="https://i.postimg.cc/C1FXygdf/IMG-6020-Coco-AI-20260303-095505-1.png" alt="Janhae Card 2">
                </div>

                <div class="profile-card">
                    <img src="https://i.postimg.cc/brLByFpX/IMG-6019-Coco-AI-20260303-095318-1.png" alt="JingJing Card">
                </div>

            </div>
        </section>

        <section id="portfolio">
            <h2 class="section-title">Videos</h2>
            
            <div class="category-label">JanJingJing Project</div>
            <div class="work-grid">
                <div class="work-item"><div class="video-container"><iframe src="https://www.youtube.com/embed/Jwv6V3Oo9P4"></iframe></div></div>
                <div class="work-item"><div class="video-container"><iframe src="https://www.youtube.com/embed/videoseries?list=PLPkSg-YEP-x4hOCEps9rfVssGqTDCUCPX"></iframe></div></div>
            </div>

            <div class="category-label">Janhae Solo</div>
            <div class="work-grid">
                <div class="work-item"><div class="video-container"><iframe src="https://www.youtube.com/embed/fA4e9V_05x4"></iframe></div></div>
                <div class="work-item"><div class="video-container"><iframe src="https://www.youtube.com/embed/p8tf3dAkvFc"></iframe></div></div>
            </div>

            <div class="category-label">JingJing Solo</div>
            <div class="work-grid">
                <div class="work-item"><div class="video-container"><iframe src="https://www.youtube.com/embed/Z0Xlq8vXk_k"></iframe></div></div>
                <div class="work-item"><div class="video-container"><iframe src="https://www.youtube.com/embed/uLRYn0u8y6o"></iframe></div></div>
            </div>
        </section>
    </div>

    <footer><p class="footer-text">Design By：JanJingJing TAIWAN FANCLUB</p></footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const videoIds = ['TEdxkK9XqDM', 'qkqSgFoVilc', 'QffkeNTjV38', 'Jwv6V3Oo9P4', 'p8tf3dAkvFc']; 
        const randomId = videoIds[Math.floor(Math.random() * videoIds.length)];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { 
                height: '0', width: '0', videoId: randomId, 
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': randomId, 'mute': 0 }, 
                events: { 'onReady': onPlayerReady } 
            });
        }
        function onPlayerReady(event) { event.target.playVideo(); }
        function enterSite() { 
            if (player && player.playVideo) { 
                player.playVideo(); 
                document.getElementById('music-btn').style.display = 'flex'; 
            }
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            splash.style.pointerEvents = 'none';
            document.body.classList.remove('locked');
            document.body.classList.add('unlocked');
            setTimeout(() => { splash.style.display = 'none'; }, 800); 
        }
        function toggleMusic() {
            const state = player.getPlayerState();
            const icon = document.getElementById('music-icon');
            if (state === 1) { player.pauseVideo(); icon.className = 'fas fa-volume-mute'; } 
            else { player.playVideo(); icon.className = 'fas fa-music'; }
        }
    </script>
</body>
</html>
